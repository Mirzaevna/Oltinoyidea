<!DOCTYPE html>
<html>
  <head>
    <title>margin/padding</title>
    <style>
      .box{
        background-color:blue;
        width:100px;
        height:100px;
        border-radius: 100px;
        
        }
      .A{
        display:flex;
        gap:20px;
        margin:10px;
      }
        h1{color:white;
          padding-left:40px;
          padding-top:9px;
          padding-right:40px;
        }
    </style>
  </head>
  <body>
    <div class="A">
      <div class="box">
        <h1>1</h1>
      </div>
      <div class="box">
        <h1>2</h1>
      </div>
      <div class="box">
        <h1>3</h1>
      </div>
    </div>
    
    <div class="A">
      <div class="box">
        <h1>4</h1>
      </div>
      <div class="box">
        <h1>5</h1>
      </div>
      <div class="box">
        <h1>6</h1>
      </div>
    </div>
    <div class="A">
      <div class="box">
        <h1>7</h1>
      </div>
      <div class="box">
        <h1>8</h1>
      </div>
      <div class="box">
        <h1>9</h1>
      </div>
    </div>
  </body>
</html>
